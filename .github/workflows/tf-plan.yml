name: Terraform Plan & Governance

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - 'policies/**'

permissions:
  id-token: write       # Required for OIDC
  contents: read
  pull-requests: write  # Required to post PR comments

env:
  TF_VERSION: "1.7.0"
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────────
  # JOB 1: Detect which environments changed
  # ────────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Environments
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.changed.outputs.environments }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed terraform environments
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD \
            | grep '^terraform/environments/' \
            | cut -d'/' -f3 \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')


          if [ "${CHANGED}" = "[]" ] || [ -z "${CHANGED}" ]; then
            CHANGED='["dev"]'
            echo "No specific environment changes detected — defaulting to dev"
          fi

          echo "environments=${CHANGED}" >> $GITHUB_OUTPUT
          echo "Changed environments: ${CHANGED}"

  # ────────────────────────────────────────────────
  # JOB 2: Terraform Validate & Plan
  # ────────────────────────────────────────────────
  terraform-plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.environments != '[]'
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.environments) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', matrix.environment)] }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        id: init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -input=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive terraform/
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.environment }}
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}
          TF_VAR_db_kms_key_arn: "alias/aws/rds"
          TF_VAR_s3_kms_key_arn: "alias/aws/s3"
          TF_VAR_app_ami_id: "ami-0abcdef1234567890"
        continue-on-error: true
        run: |
          terraform plan \
            -input=false \
            -out=tfplan \
            -var-file="terraform.tfvars"
          echo "plan_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Convert plan to JSON
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          terraform show -json tfplan > tfplan.json
          echo "Plan JSON size: $(wc -c < tfplan.json) bytes"

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}-${{ github.sha }}
          path: |
            terraform/environments/${{ matrix.environment }}/tfplan
            terraform/environments/${{ matrix.environment }}/tfplan.json
          retention-days: 7

      - name: Parse plan summary
        id: plan-summary
        continue-on-error: true
        working-directory: terraform/environments/${{ matrix.environment }}
        run: |
          ADDS=$(cat tfplan.json | jq '[.resource_changes[]? | select(.change.actions[] == "create")] | length')
          CHANGES=$(cat tfplan.json | jq '[.resource_changes[]? | select(.change.actions[] == "update")] | length')
          DESTROYS=$(cat tfplan.json | jq '[.resource_changes[]? | select(.change.actions[] == "delete")] | length')
          echo "adds=${ADDS}" >> $GITHUB_OUTPUT
          echo "changes=${CHANGES}" >> $GITHUB_OUTPUT
          echo "destroys=${DESTROYS}" >> $GITHUB_OUTPUT
          echo "Plan: +${ADDS} ~${CHANGES} -${DESTROYS}"

      - name: Post plan summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ matrix.environment }}';
            const adds = '${{ steps.plan-summary.outputs.adds }}';
            const changes = '${{ steps.plan-summary.outputs.changes }}';
            const destroys = '${{ steps.plan-summary.outputs.destroys }}';
            const fmt = '${{ steps.fmt.outcome }}';

            const emoji = destroys > 0 ? '⚠️' : adds > 0 ? '🟢' : '🔄';

            const body = `## ${emoji} Terraform Plan — \`${env}\`

            | | Count |
            |---|---|
            | ➕ Resources to add | \`${adds}\` |
            | 🔄 Resources to change | \`${changes}\` |
            | ❌ Resources to destroy | \`${destroys}\` |

            **Format check:** ${fmt === 'success' ? '✅ Passed' : '⚠️ Fix formatting with `terraform fmt`'}

            > Plan artifact: \`tfplan-${env}-${{ github.sha }}\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ────────────────────────────────────────────────
  # JOB 3: Security Scanning with Checkov
  # ────────────────────────────────────────────────
  security-scan:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan]
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          config_file: security/.checkov.yml
          output_format: json
          output_file_path: checkov-results.json
          soft_fail: true  # Don't fail pipeline — AI summarizer decides

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results-${{ github.sha }}
          path: checkov-results.json

      - name: Post Checkov summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('checkov-results.json', 'utf8'));
            } catch(e) {
              console.log('Could not parse checkov results');
              return;
            }

            // Handle both single and multi-check result formats
            const checks = Array.isArray(results) ? results : [results];
            let passed = 0, failed = 0, skipped = 0;
            const failedChecks = [];

            for (const check of checks) {
              passed += check.summary?.passed || 0;
              failed += check.summary?.failed || 0;
              skipped += check.summary?.skipped || 0;

              (check.results?.failed_checks || []).slice(0, 5).forEach(c => {
                failedChecks.push(`| \`${c.check_id}\` | ${c.check.name} | \`${c.resource}\` | ${c.severity || 'MEDIUM'} |`);
              });
            }

            const statusEmoji = failed === 0 ? '✅' : failed < 5 ? '⚠️' : '🚨';

            const body = `## ${statusEmoji} Security Scan Results (Checkov)

            | Passed | Failed | Skipped |
            |---|---|---|
            | ${passed} | ${failed} | ${skipped} |

            ${failedChecks.length > 0 ? `### Top Findings\n| Check ID | Name | Resource | Severity |\n|---|---|---|---|\n${failedChecks.join('\n')}` : ''}

            ${failed > 5 ? `\n> Showing top 5 of ${failed} failures. See artifact for full report.` : ''}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ────────────────────────────────────────────────
  # JOB 4: OPA Policy Enforcement
  # ────────────────────────────────────────────────
  policy-check:
    name: OPA Policy Check
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan]
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.environments) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}-${{ github.sha }}
          path: terraform/environments/${{ matrix.environment }}

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/v0.60.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Run OPA policies
        id: opa
        continue-on-error: true
        run: |
          OPA_RESULT=$(opa eval \
            --input terraform/environments/${{ matrix.environment }}/tfplan.json \
            --data policies/opa/ \
            --format json \
            "data.terraform.policies.deny")

          echo "${OPA_RESULT}" > opa-results.json

          VIOLATIONS=$(echo "${OPA_RESULT}" | jq '.result[0].expressions[0].value | length')
          echo "violations=${VIOLATIONS}" >> $GITHUB_OUTPUT
          echo "OPA violations: ${VIOLATIONS}"

          if [ "${VIOLATIONS}" -gt "0" ]; then
            echo "OPA policy violations found:"
            echo "${OPA_RESULT}" | jq '.result[0].expressions[0].value[]'
          fi

      - name: Upload OPA results
        uses: actions/upload-artifact@v4
        with:
          name: opa-results-${{ matrix.environment }}-${{ github.sha }}
          path: opa-results.json

      - name: Post OPA results comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const violations = parseInt('${{ steps.opa.outputs.violations }}');
            let violationList = '';

            try {
              const result = JSON.parse(fs.readFileSync('opa-results.json', 'utf8'));
              const items = result?.result?.[0]?.expressions?.[0]?.value || [];
              violationList = items.map(v => `- ❌ ${v}`).join('\n');
            } catch(e) {}

            const body = `## ${violations === 0 ? '✅' : '🚨'} OPA Policy Check — \`${{ matrix.environment }}\`

            **Violations found: ${violations}**

            ${violationList || (violations === 0 ? '_All policies passed._' : '_See artifact for details._')}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ────────────────────────────────────────────────
  # JOB 5: Cost Analysis with Infracost
  # ────────────────────────────────────────────────
  cost-analysis:
    name: Cost Analysis (Infracost)
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost baseline (main branch)
        run: |
          infracost breakdown \
            --path terraform/ \
            --format json \
            --out-file infracost-base.json \
            --terraform-var-file terraform/environments/dev/terraform.tfvars

      - name: Generate Infracost for this PR
        run: |
          infracost breakdown \
            --path terraform/ \
            --format json \
            --out-file infracost-pr.json \
            --terraform-var-file terraform/environments/dev/terraform.tfvars

      - name: Generate cost diff
        run: |
          infracost diff \
            --path infracost-pr.json \
            --compare-to infracost-base.json \
            --format json \
            --out-file infracost-diff.json

      - name: Upload cost artifacts
        uses: actions/upload-artifact@v4
        with:
          name: infracost-${{ github.sha }}
          path: |
            infracost-diff.json
            infracost-pr.json

      - name: Post cost comment
        run: |
          infracost comment github \
            --path infracost-diff.json \
            --repo ${{ github.repository }} \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update

  # ────────────────────────────────────────────────
  # JOB 6: AI Risk Summarizer (runs after all scans)
  # ────────────────────────────────────────────────
  ai-risk-summary:
    name: AI Risk Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, terraform-plan, security-scan, policy-check, cost-analysis]
    if: always()  # Run even if upstream jobs have warnings
    strategy:
      matrix:
        environment: ${{ fromJson(needs.detect-changes.outputs.environments) }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Run AI summarizer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          ENVIRONMENT: ${{ matrix.environment }}
          SHA: ${{ github.sha }}
        run: |
          python ai-summarizer/summarize.py \
            --plan-json "artifacts/tfplan-${{ matrix.environment }}-${{ github.sha }}/tfplan.json" \
            --checkov-json "artifacts/checkov-results-${{ github.sha }}/checkov-results.json" \
            --opa-json "artifacts/opa-results-${{ matrix.environment }}-${{ github.sha }}/opa-results.json" \
            --infracost-json "artifacts/infracost-${{ github.sha }}/infracost-diff.json"
